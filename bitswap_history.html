<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BitSwap | History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --bg-primary:#0A0E17;--bg-secondary:#0F1624;--bg-card:#0F1624;
            --bg-elevated:#131A2C;--border:#1E293B;--text-primary:#EFF3FC;
            --text-secondary:#94A3B8;--accent:#D4AF37;--accent-hover:#C5A028;
            --success:#2BE07E;--warning:#FFB347;--danger:#FF4D4D;
        }
        body.light{
            --bg-primary:#F1F5F9;--bg-secondary:#FFFFFF;--bg-card:#FFFFFF;
            --bg-elevated:#E2E8F0;--border:#CBD5E1;--text-primary:#0F172A;
            --text-secondary:#475569;--accent:#B8860B;--success:#10B981;
            --warning:#F59E0B;--danger:#EF4444;
        }
        body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);
            padding:0 0 90px 0;min-height:100vh;transition:background 0.3s,color 0.2s;}
        .page-header{display:flex;align-items:center;justify-content:space-between;
            padding:18px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);
            position:sticky;top:0;z-index:50;}
        .back-btn{background:var(--bg-elevated);border:none;color:var(--text-primary);
            padding:8px 16px;border-radius:40px;cursor:pointer;font-size:14px;font-weight:600;
            display:flex;align-items:center;gap:6px;}
        .page-title{font-size:18px;font-weight:800;}
        .theme-toggle{background:var(--bg-elevated);border:1px solid var(--border);
            border-radius:40px;padding:8px 12px;cursor:pointer;font-size:16px;color:var(--text-primary);}
        .content{padding:20px 16px;}
        .tabs{display:flex;gap:8px;margin-bottom:20px;}
        .tab-btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);
            font-weight:600;padding:10px 20px;border-radius:40px;cursor:pointer;font-size:13px;transition:0.2s;flex:1;}
        .tab-btn.active{background:var(--accent);color:#0A0E17;border-color:var(--accent);}
        .section-card{background:var(--bg-card);border-radius:24px;padding:20px;
            border:1px solid var(--border);margin-bottom:20px;}
        .section-title{font-size:16px;font-weight:700;margin-bottom:16px;
            display:flex;align-items:center;gap:8px;}
        .tx-item{background:var(--bg-elevated);border-radius:16px;padding:14px 16px;
            margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
        .tx-icon{width:40px;height:40px;border-radius:50%;display:flex;
            align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
        .tx-icon.deposit{background:rgba(43,224,126,0.15);color:var(--success);}
        .tx-icon.withdrawal{background:rgba(255,77,77,0.15);color:var(--danger);}
        .tx-icon.plan{background:rgba(212,175,55,0.15);color:var(--accent);}
        .tx-info{flex:1;}
        .tx-type{font-size:14px;font-weight:700;}
        .tx-date{font-size:11px;color:var(--text-secondary);margin-top:2px;}
        .tx-detail{font-size:11px;color:var(--text-secondary);margin-top:2px;}
        .tx-right{text-align:right;}
        .tx-amount{font-size:16px;font-weight:800;}
        .tx-amount.deposit{color:var(--success);}
        .tx-amount.withdrawal{color:var(--danger);}
        .tx-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:4px;display:inline-block;}
        .tx-status.completed{background:rgba(43,224,126,0.15);color:var(--success);}
        .tx-status.pending{background:rgba(255,179,71,0.15);color:var(--warning);}
        .tx-status.rejected{background:rgba(255,77,77,0.15);color:var(--danger);}
        .empty-state{text-align:center;padding:40px 20px;}
        .empty-state i{font-size:48px;color:var(--border);margin-bottom:12px;}
        .empty-state p{color:var(--text-secondary);font-size:14px;}
        .hidden{display:none;}
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;
            max-width:600px;background:var(--bg-primary);border-top:1px solid var(--border);
            display:flex;justify-content:space-around;padding:10px 8px;
            border-radius:24px 24px 0 0;z-index:100;}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
            font-size:10px;color:var(--text-secondary);cursor:pointer;text-decoration:none;
            padding:4px 8px;border-radius:12px;transition:0.2s;min-width:44px;}
        .nav-item i{font-size:20px;}
        .nav-item.active,.nav-item:hover{color:var(--accent);}
        .toast-msg{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
            background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);
            padding:12px 24px;border-radius:40px;font-size:14px;font-weight:600;
            z-index:9999;animation:fadeIn 0.2s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}
            to{opacity:1;transform:translateX(-50%) translateY(0);}}
    </style>
</head>
<body>
    <div class="page-header">
        <button class="back-btn" onclick="window.location.href='bitswap_dashboard.html'">
            <i class="fas fa-arrow-left"></i> Dashboard
        </button>
        <span class="page-title"><i class="fas fa-clock" style="color:var(--accent);margin-right:6px;"></i>History</span>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <div class="content">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('transactions',this)">
                <i class="fas fa-list"></i> Transactions
            </button>
            <button class="tab-btn" onclick="showTab('withdrawals',this)">
                <i class="fas fa-arrow-up"></i> Withdrawals
            </button>
        </div>

        <!-- Transaction History Tab -->
        <div id="transactionsTab">
            <div class="section-card">
                <div class="section-title">
                    <i class="fas fa-exchange-alt" style="color:var(--accent);"></i> Transaction History
                </div>
                <div id="txList"></div>
            </div>
        </div>

        <!-- Withdrawal History Tab -->
        <div id="withdrawalsTab" class="hidden">
            <div class="section-card">
                <div class="section-title">
                    <i class="fas fa-arrow-up" style="color:var(--danger);"></i> Withdrawal Requests
                </div>
                <div id="wdList"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="bitswap_dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="bitswap_deposit.html" class="nav-item"><i class="fas fa-arrow-down"></i><span>Deposit</span></a>
        <a href="bitswap_withdraw.html" class="nav-item"><i class="fas fa-arrow-up"></i><span>Withdraw</span></a>
        <a href="bitswap_plans.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Plans</span></a>
        <a href="bitswap_actions.html" class="nav-item"><i class="fas fa-cogs"></i><span>Actions</span></a>
        <a href="bitswap_history.html" class="nav-item active"><i class="fas fa-clock"></i><span>History</span></a>
        <a href="bitswap_profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

<script>
    // ---------- SUPABASE AUTH (matches dashboard.html) ----------
    const SUPABASE_URL = 'https://wzphhuaxrgxprjysxzup.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6cGhodWF4cmd4cHJqeXN4enVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODE0MjYsImV4cCI6MjEwMDI1NzQyNn0.JGY2QohM1o262e6coRzKEzoQGjI1L5ruHQ7t4Gi40w';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function loadUser() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = 'bitswap_login.html';
            return;
        }
        const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
        currentUser = {
            id: session.user.id,
            email: session.user.email,
            full_name: profile?.full_name || session.user.email.split('@')[0],
            transactions: profile?.transactions || []
        };
        renderTransactions();
        renderWithdrawals();
    }

    function showTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('transactionsTab').classList.toggle('hidden', tab !== 'transactions');
        document.getElementById('withdrawalsTab').classList.toggle('hidden', tab !== 'withdrawals');
    }

    function renderTransactions() {
        const txs = currentUser.transactions || [];
        if (txs.length === 0) {
            document.getElementById('txList').innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>No transactions yet.<br>Make your first deposit to get started.</p></div>`;
            return;
        }
        document.getElementById('txList').innerHTML = txs.map(tx => {
            const isDeposit = tx.type === 'Deposit';
            return `
                <div class="tx-item">
                    <div class="tx-icon ${isDeposit ? 'deposit' : 'withdrawal'}">
                        <i class="fas fa-arrow-${isDeposit ? 'down' : 'up'}"></i>
                    </div>
                    <div class="tx-info">
                        <div class="tx-type">${tx.type}</div>
                        <div class="tx-date">${new Date(tx.date).toLocaleString()}</div>
                        ${tx.details ? `<div class="tx-detail">${tx.details}</div>` : ''}
                    </div>
                    <div class="tx-right">
                        <div class="tx-amount ${isDeposit ? 'deposit' : 'withdrawal'}">
                            ${isDeposit ? '+' : '-'}$${tx.amount.toFixed(2)}
                        </div>
                        <span class="tx-status completed">Completed</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderWithdrawals() {
        let wrs = [];
        try {
            wrs = JSON.parse(localStorage.getItem('nexvault_withdrawal_requests') || '[]');
            wrs = wrs.filter(r => r.userId === currentUser.id);
        } catch(e) {}
        if (wrs.length === 0) {
            document.getElementById('wdList').innerHTML = `<div class="empty-state"><i class="fas fa-paper-plane"></i><p>No withdrawal requests yet.</p></div>`;
            return;
        }
        document.getElementById('wdList').innerHTML = wrs.map(r => `
            <div class="tx-item">
                <div class="tx-icon withdrawal"><i class="fas fa-arrow-up"></i></div>
                <div class="tx-info">
                    <div class="tx-type">Withdrawal — ${r.method}</div>
                    <div class="tx-date">${new Date(r.date).toLocaleString()}</div>
                    <div class="tx-detail">Fee: $${(r.fee||0).toFixed(2)} · Net: $${(r.netAmount||r.amount).toFixed(2)}</div>
                </div>
                <div class="tx-right">
                    <div class="tx-amount withdrawal">-$${r.amount.toFixed(2)}</div>
                    <span class="tx-status ${r.status}">${r.status.charAt(0).toUpperCase() + r.status.slice(1)}</span>
                </div>
            </div>
        `).join('');
    }

    // ---------- THEME PERSISTENCE ----------
    function loadTheme() {
        const savedTheme = localStorage.getItem('nexvault_theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            const icon = document.querySelector('#themeToggle i');
            if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
        }
    }
    loadTheme();

    document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('light');
        const icon = document.querySelector('#themeToggle i');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
        localStorage.setItem('nexvault_theme', document.body.classList.contains('light') ? 'light' : 'dark');
    });

    loadUser();
</script>
</body>
</html>
