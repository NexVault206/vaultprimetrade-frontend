<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - BitSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0D0D0D, #111111); font-family: Inter, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #111111; padding: 40px 42px; border-radius: 48px; width: 480px; max-width: 100%; border: 1px solid #2a2a2a; box-shadow: 0 25px 45px rgba(0,0,0,0.6); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo span { color: #10B981; font-size: 1.6rem; font-weight: 800; }
        h1 { color: #10B981; font-weight: 700; font-size: 1.8rem; margin-bottom: 6px; }
        .sub { color: #9ca3af; margin-bottom: 20px; font-size: 0.95rem; }
        .bonus { background: #1e2a3a; padding: 12px 16px; border-radius: 30px; text-align: center; margin: 0 0 18px; color: #10B981; font-weight: 600; font-size: 0.95rem; }
        input { width: 100%; padding: 14px 18px; margin: 6px 0; background: #1a1a1a; border: 1px solid #2d354c; border-radius: 30px; color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(245,166,35,0.15); }
        .btn { width: 100%; background: #10B981; padding: 15px; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; margin-top: 16px; cursor: pointer; color: #111111; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg { padding: 12px 16px; border-radius: 12px; margin-top: 14px; font-size: 0.9rem; display: none; }
        .msg.error { background: #2a1515; color: #f87171; display: block; }
        .msg.success { background: #152a1a; color: #4ade80; display: block; }
        .msg.info { background: #1a263a; color: #93c5fd; display: block; }
        .link { text-align: center; margin-top: 22px; color: #9ca3af; font-size: 0.95rem; }
        .link a { color: #10B981; text-decoration: none; font-weight: 500; }
        .hidden { display: none !important; }
        .otp-icon { font-size: 3rem; text-align: center; margin-bottom: 16px; }
        .otp-label { color: #10B981; font-weight: 600; text-align: center; margin-bottom: 6px; word-break: break-all; }
        .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .otp-inputs input { width: 48px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 16px; padding: 0; margin: 0; border: 2px solid #2d354c; background: #1a1a1a; color: #fff; }
        .otp-inputs input:focus { border-color: #10B981; }
        .resend { text-align: center; margin-top: 14px; color: #9ca3af; font-size: 0.9rem; }
        .resend button { background: none; border: none; color: #10B981; font-weight: 600; cursor: pointer; font-size: 0.9rem; width: auto; padding: 0; margin: 0; text-decoration: underline; }
        .resend button:disabled { color: #555; text-decoration: none; }
        @media (max-width: 520px) { .card { padding: 28px 20px; } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><span>BitSwap</span></div>

    <div id="signupScreen">
        <h1>Create Account</h1>
        <p class="sub">Join now and get 10% bonus on first deposit</p>
        <div class="bonus">Limited time offer: 10% extra bonus</div>
        <input type="text" id="signupName" placeholder="Full Name" autocomplete="name">
        <input type="text" id="signupUsername" placeholder="Username (e.g. Peter fx)" autocomplete="username">
        <input type="email" id="signupEmail" placeholder="Email Address" autocomplete="email">
        <input type="password" id="signupPassword" placeholder="Create Password (min 6 chars)">
        <input type="password" id="signupConfirm" placeholder="Confirm Password">
        <div class="msg" id="msgBox"></div>
        <button class="btn" type="button" id="signupBtn">Sign Up and Claim Bonus</button>
        <div class="link">Already have an account? <a href="bitswap_login.html">Login</a> | <a href="bitswap_index.html">Home</a></div>
    </div>

    <div id="otpScreen" class="hidden">
        <div class="otp-icon">📬</div>
        <h1 style="text-align:center;font-size:1.5rem;">Verify Your Email</h1>
        <p class="sub" style="text-align:center;margin-top:8px;">We sent a 6-digit code to</p>
        <div class="otp-label" id="otpEmailLabel"></div>
        <div class="otp-inputs">
            <input type="tel" maxlength="1" class="otp-digit" id="d1">
            <input type="tel" maxlength="1" class="otp-digit" id="d2">
            <input type="tel" maxlength="1" class="otp-digit" id="d3">
            <input type="tel" maxlength="1" class="otp-digit" id="d4">
            <input type="tel" maxlength="1" class="otp-digit" id="d5">
            <input type="tel" maxlength="1" class="otp-digit" id="d6">
        </div>
        <div class="msg" id="otpMsgBox"></div>
        <button class="btn" type="button" id="verifyBtn">Verify and Activate Account</button>
        <div class="resend">Did not get the code? <button id="resendBtn" disabled>Resend</button> <span id="resendTimer">in 60s</span></div>
        <div class="link" style="margin-top:16px;"><a href="#" id="backToSignup">Back to signup</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    var SB_URL = "https://wzphhuaxrgxprjysxzup.supabase.co";
    var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6cGhodWF4cmd4cHJqeXN4enVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODE0MjYsImV4cCI6MjEwMDI1NzQyNn0.JGY2QohM1o262e6coRzKEzoQGjI1L5ruHQ7t4Gi40Mw";
    var sb = window.supabase.createClient(SB_URL, SB_KEY);
    var pendingEmail = "";
    var resendInterval = null;

    sb.auth.getSession().then(function(r) {
        if (r.data.session) window.location.href = "bitswap_dashboard.html";
    });

    function showMsg(id, text, type) {
        var b = document.getElementById(id);
        b.className = "msg " + type;
        b.textContent = text;
        b.style.display = "block";
    }
    function hideMsg(id) {
        var b = document.getElementById(id);
        b.style.display = "none";
        b.className = "msg";
    }
    function showOtp(email) {
        document.getElementById("signupScreen").classList.add("hidden");
        document.getElementById("otpScreen").classList.remove("hidden");
        document.getElementById("otpEmailLabel").textContent = email;
        document.getElementById("d1").focus();
        startTimer();
    }
    function getOtp() {
        return Array.from(document.querySelectorAll(".otp-digit")).map(function(d) { return d.value; }).join("");
    }
    function clearOtp() {
        document.querySelectorAll(".otp-digit").forEach(function(d) { d.value = ""; });
        document.getElementById("d1").focus();
    }
    function startTimer() {
        var btn = document.getElementById("resendBtn");
        var el = document.getElementById("resendTimer");
        btn.disabled = true;
        var s = 60;
        el.textContent = "in " + s + "s";
        if (resendInterval) clearInterval(resendInterval);
        resendInterval = setInterval(function() {
            s--;
            if (s <= 0) { clearInterval(resendInterval); btn.disabled = false; el.textContent = ""; }
            else { el.textContent = "in " + s + "s"; }
        }, 1000);
    }

    document.querySelectorAll(".otp-digit").forEach(function(input, i, all) {
        input.addEventListener("input", function() {
            this.value = this.value.slice(-1).replace(/[^0-9]/g, "");
            if (this.value && i < all.length - 1) all[i+1].focus();
        });
        input.addEventListener("keydown", function(e) {
            if (e.key === "Backspace" && !this.value && i > 0) all[i-1].focus();
        });
    });

    document.getElementById("signupBtn").addEventListener("click", async function() {
        hideMsg("msgBox");
        var name = document.getElementById("signupName").value.trim();
        var username = document.getElementById("signupUsername").value.trim();
        var email = document.getElementById("signupEmail").value.trim();
        var pass = document.getElementById("signupPassword").value;
        var conf = document.getElementById("signupConfirm").value;
        if (!name || !username || !email || !pass || !conf) return showMsg("msgBox", "Please fill in all fields.", "error");
        if (username.length < 3) return showMsg("msgBox", "Username must be at least 3 characters.", "error");
        if (pass !== conf) return showMsg("msgBox", "Passwords do not match.", "error");
        if (pass.length < 6) return showMsg("msgBox", "Password must be at least 6 characters.", "error");
        this.disabled = true;
        this.textContent = "Creating account...";
        try {
            var r = await sb.auth.signUp({ email: email, password: pass, options: { data: { full_name: name, username: username } } });
            if (r.error) {
                this.disabled = false;
                this.textContent = "Sign Up and Claim Bonus";
                console.log("SIGNUP ERROR FULL:", JSON.stringify(r.error, Object.getOwnPropertyNames(r.error)));
                var rawMsg = r.error.message || r.error.msg || r.error.error_description || JSON.stringify(r.error);
                return showMsg("msgBox", "DEBUG [" + (r.error.status || "?") + "]: " + rawMsg, "error");
            }
            if (r.data && r.data.user) {
                await sb.from("profiles").upsert({ id: r.data.user.id, full_name: name, username: username, email: email }, { onConflict: "id" });
            }
            await sb.auth.signOut();
            pendingEmail = email;
            showOtp(email);
        } catch(e) {
            this.disabled = false;
            this.textContent = "Sign Up and Claim Bonus";
            console.log("SIGNUP CATCH FULL:", e, JSON.stringify(e, Object.getOwnPropertyNames(e)));
            showMsg("msgBox", "DEBUG CATCH: " + (e.message || JSON.stringify(e)), "error");
        }
    });

    document.getElementById("verifyBtn").addEventListener("click", async function() {
        hideMsg("otpMsgBox");
        var token = getOtp();
        if (token.length < 6) return showMsg("otpMsgBox", "Please enter the full 6-digit code.", "error");
        this.disabled = true;
        this.textContent = "Verifying...";
        try {
            var r = await sb.auth.verifyOtp({ email: pendingEmail, token: token, type: "signup" });
            if (r.error) {
                this.disabled = false;
                this.textContent = "Verify and Activate Account";
                clearOtp();
                return showMsg("otpMsgBox", r.error.message, "error");
            }
            showMsg("otpMsgBox", "Email verified! Going to dashboard...", "success");
            setTimeout(function() { window.location.href = "bitswap_dashboard.html"; }, 1500);
        } catch(e) {
            this.disabled = false;
            this.textContent = "Verify and Activate Account";
            showMsg("otpMsgBox", "Unexpected error. Please try again.", "error");
        }
    });

    document.getElementById("resendBtn").addEventListener("click", async function() {
        hideMsg("otpMsgBox");
        this.disabled = true;
        document.getElementById("resendTimer").textContent = "...";
        var r = await sb.auth.resend({ type: "signup", email: pendingEmail });
        if (r.error) { showMsg("otpMsgBox", "Could not resend: " + r.error.message, "error"); }
        else { showMsg("otpMsgBox", "New code sent to " + pendingEmail, "info"); clearOtp(); }
        startTimer();
    });

    document.getElementById("backToSignup").addEventListener("click", function(e) {
        e.preventDefault();
        document.getElementById("otpScreen").classList.add("hidden");
        document.getElementById("signupScreen").classList.remove("hidden");
        hideMsg("otpMsgBox");
    });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
