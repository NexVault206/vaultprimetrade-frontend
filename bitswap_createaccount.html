<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - BitSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0D0D0D, #111111); font-family: Inter, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #111111; padding: 40px 42px; border-radius: 48px; width: 480px; max-width: 100%; border: 1px solid #2a2a2a; box-shadow: 0 25px 45px rgba(0,0,0,0.6); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo span { color: #10B981; font-size: 1.6rem; font-weight: 800; }
        h1 { color: #10B981; font-weight: 700; font-size: 1.8rem; margin-bottom: 6px; }
        .sub { color: #9ca3af; margin-bottom: 20px; font-size: 0.95rem; }
        .bonus { background: #1e2a3a; padding: 12px 16px; border-radius: 30px; text-align: center; margin: 0 0 18px; color: #10B981; font-weight: 600; font-size: 0.95rem; }
        input { width: 100%; padding: 14px 18px; margin: 6px 0; background: #1a1a1a; border: 1px solid #2d354c; border-radius: 30px; color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
        .btn { width: 100%; background: #10B981; padding: 15px; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; margin-top: 16px; cursor: pointer; color: #111111; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .google-btn { background: #fff; color: #111; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 0; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 10px; color: #6b7280; font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2d354c; }
        .turnstile-wrap { margin-top: 16px; display: flex; justify-content: center; }
        .msg { padding: 12px 16px; border-radius: 12px; margin-top: 14px; font-size: 0.9rem; display: none; }
        .msg.error { background: #2a1515; color: #f87171; display: block; }
        .msg.success { background: #152a1a; color: #4ade80; display: block; }
        .msg.info { background: #1a263a; color: #93c5fd; display: block; }
        .link { text-align: center; margin-top: 22px; color: #9ca3af; font-size: 0.95rem; }
        .link a { color: #10B981; text-decoration: none; font-weight: 500; }
        @media (max-width: 520px) { .card { padding: 28px 20px; } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><span>BitSwap</span></div>

    <div id="signupScreen">
        <h1>Create Account</h1>
        <p class="sub">Join now and get 10% bonus on first deposit</p>
        <div class="bonus">Limited time offer: 10% extra bonus</div>

        <button type="button" class="btn google-btn" id="googleBtn">Continue with Google</button>
        <div class="divider"><span>or sign up with email</span></div>

        <input type="text" id="signupName" placeholder="Full Name" autocomplete="name">
        <input type="email" id="signupEmail" placeholder="Email Address" autocomplete="email">
        <input type="password" id="signupPassword" placeholder="Create Password (min 6 chars)">
        <input type="password" id="signupConfirm" placeholder="Confirm Password">

        <div class="turnstile-wrap">
            <div class="h-captcha" data-sitekey="83c63a18-007e-4398-b94c-9c7214f4b810" data-callback="onTurnstileSuccess" data-theme="dark"></div>
        </div>

        <div class="msg" id="msgBox"></div>
        <button class="btn" type="button" id="signupBtn">Sign Up and Claim Bonus</button>
        <div class="link">Already have an account? <a href="bitswap_login.html">Login</a> | <a href="bitswap_index.html">Home</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script>
    const SUPABASE_URL = 'https://wzphhuaxrgxprjysxzup.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6cGhodWF4cmd4cHJqeXN4enVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODE0MjYsImV4cCI6MjEwMDI1NzQyNn0.JGY2QohM1o262e6coRzKEzoQGjI1L5ruHQ7t4Gi40w';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let turnstileToken = null;
    function onTurnstileSuccess(token) { turnstileToken = token; }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + type;
    }

    document.getElementById('googleBtn').addEventListener('click', async function() {
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/bitswap_dashboard.html' }
        });
        if (error) showMsg('msgBox', 'Google sign-in error: ' + error.message, 'error');
    });

    document.getElementById('signupBtn').addEventListener('click', async function() {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const pass = document.getElementById('signupPassword').value;
        const conf = document.getElementById('signupConfirm').value;

        if (!name || !email || !pass || !conf) return showMsg('msgBox', 'Please fill in all fields.', 'error');
        if (pass !== conf) return showMsg('msgBox', 'Passwords do not match.', 'error');
        if (pass.length < 6) return showMsg('msgBox', 'Password must be at least 6 characters.', 'error');
        if (!turnstileToken) return showMsg('msgBox', 'Please complete the human verification.', 'error');

        this.disabled = true;
        this.textContent = 'Creating account...';

        try {
            const r = await sb.auth.signUp({
                email: email,
                password: pass,
                options: {
                    data: { full_name: name },
                    captchaToken: turnstileToken
                }
            });

            if (r.error) {
                this.disabled = false;
                this.textContent = 'Sign Up and Claim Bonus';
                return showMsg('msgBox', r.error.message, 'error');
            }

            if (r.data && r.data.user) {
                await sb.from('profiles').upsert({ id: r.data.user.id, full_name: name, email: email }, { onConflict: 'id' });
            }

            if (r.data && r.data.session) {
                window.location.href = 'bitswap_choose_username.html';
            } else {
                showMsg('msgBox', 'Account created — please log in.', 'success');
                setTimeout(() => window.location.href = 'bitswap_login.html', 1500);
            }
        } catch (e) {
            this.disabled = false;
            this.textContent = 'Sign Up and Claim Bonus';
            showMsg('msgBox', 'Error: ' + (e.message || JSON.stringify(e)), 'error');
        }
    });
</script>
</body>
</html>
