<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BitSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0D0D0D, #111111); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: #111111; padding: 40px 42px; border-radius: 48px; width: 420px; max-width: 100%; border: 1px solid #2a2a2a; box-shadow: 0 25px 45px rgba(0,0,0,0.6); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo span { color: #10B981; font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .login-card h1 { color: #10B981; font-weight: 700; font-size: 1.8rem; margin-bottom: 6px; }
        .sub { color: #9ca3af; margin-bottom: 24px; font-size: 0.95rem; }
        input { width: 100%; padding: 14px 18px; margin: 6px 0; background: #1a1a1a; border: 1px solid #2d354c; border-radius: 30px; color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(245,166,35,0.15); }
        button { width: 100%; background: #10B981; padding: 15px; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; margin-top: 16px; cursor: pointer; transition: opacity 0.2s; color: #111111; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg-box { padding: 12px 16px; border-radius: 12px; margin-top: 14px; font-size: 0.9rem; display: none; line-height: 1.4; }
        .msg-box.error { background: #2a1515; color: #f87171; display: block; }
        .msg-box.success { background: #152a1a; color: #4ade80; display: block; }
        .msg-box.info { background: #1a263a; color: #93c5fd; display: block; }
        .links { text-align: center; margin-top: 24px; }
        .links a { color: #10B981; text-decoration: none; margin: 0 8px; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        .back-home { text-align: center; margin-top: 20px; }
        .back-home a { color: #10B981; text-decoration: none; font-weight: 500; }
        .back-home a:hover { text-decoration: underline; }
        @media (max-width: 520px) { .login-card { padding: 28px 20px; } }
        .hidden { display: none !important; }
        .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }
        .otp-inputs input { width: 44px; height: 52px; text-align: center; font-size: 1.4rem; font-weight: 700; border-radius: 14px; padding: 0; margin: 0; border: 2px solid #2d354c; background: #1a1a1a; color: #fff; }
        .otp-inputs input:focus { border-color: #10B981; }
        .resend-link { text-align: center; margin-top: 12px; color: #9ca3af; font-size: 0.85rem; }
        .resend-link button { background: none; border: none; color: #10B981; font-weight: 600; cursor: pointer; font-size: 0.85rem; width: auto; padding: 0; margin: 0; text-decoration: underline; }
        .resend-link button:disabled { color: #555; text-decoration: none; }
    </style>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>
<div class="login-card">
    <div class="logo"><span>⬡ BitSwap</span></div>
    <h1>Welcome Back</h1>
    <p class="sub">Login to your BitSwap account</p>

    <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">

    <div class="turnstile-wrap">
      <div class="h-captcha" data-sitekey="48eae7b2-a4ac-470e-9aec-8aa2fd748958" data-callback="onLoginCaptchaSuccess" data-theme="dark"></div>
    </div>
    <script>let loginCaptchaToken = null; function onLoginCaptchaSuccess(token) { loginCaptchaToken = token; }</script>

    <div class="msg-box" id="msgBox"></div>
    <button type="button" id="loginBtn">Login</button>

    <div class="links">
        <a href="bitswap_createaccount.html">Create Account</a> |
        <a href="#" id="forgotLink">Forgot Password?</a>
    </div>
    <div class="back-home"><a href="bitswap_index.html">← Back to Home</a></div>
</div>

<div id="otpVerifyCard" class="login-card hidden" style="margin-top:16px;">
    <div class="logo"><span>BitSwap</span></div>
    <h1 style="font-size:1.4rem;">Verify Your Email</h1>
    <p class="sub" id="otpVerifySub">Enter the 6-digit code sent to your email.</p>
    <div class="otp-inputs">
        <input type="tel" maxlength="1" class="v-digit" id="v1">
        <input type="tel" maxlength="1" class="v-digit" id="v2">
        <input type="tel" maxlength="1" class="v-digit" id="v3">
        <input type="tel" maxlength="1" class="v-digit" id="v4">
        <input type="tel" maxlength="1" class="v-digit" id="v5">
        <input type="tel" maxlength="1" class="v-digit" id="v6">
    </div>
    <div class="msg-box" id="otpMsgBox"></div>
    <button type="button" id="otpVerifyBtn">Verify and Login</button>
    <div class="resend-link">Didn't get the code? <button id="otpResendBtn" disabled>Resend</button> <span id="otpTimer">in 60s</span></div>
    <div style="text-align:center;margin-top:16px;"><a href="#" id="backToLoginLink" style="color:#10B981;font-size:0.85rem;">Back to Login</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const SUPABASE_URL = 'https://wzphhuaxrgxprjysxzup.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6cGhodWF4cmd4cHJqeXN4enVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODE0MjYsImV4cCI6MjEwMDI1NzQyNn0.JGY2QohM1o262e6coRzKEzoQGjI1L5ruHQ7t4Gi40Mw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client created (login)');

        const emailInput = document.getElementById('loginEmail');
        const passInput = document.getElementById('loginPassword');
        const btn = document.getElementById('loginBtn');
        const msgBox = document.getElementById('msgBox');

        // Handle logout param or check session
        (async function checkSession() {
            try {
                const params = new URLSearchParams(window.location.search);
                if (params.get('logout') === '1') {
                    await supabase.auth.signOut();
                    // Remove param from URL
                    window.history.replaceState({}, '', window.location.pathname);
                    return;
                }
                const { data: { session } } = await supabase.auth.getSession();
                if (session) window.location.href = 'bitswap_dashboard.html';
            } catch (e) {
                console.warn('Session check error:', e);
            }
        })();

        function showMessage(text, type = 'error') {
            msgBox.className = 'msg-box ' + type;
            msgBox.textContent = text;
            msgBox.style.display = 'block';
        }
        function hideMessage() {
            msgBox.style.display = 'none';
            msgBox.className = 'msg-box';
        }

        async function handleLogin() {
            console.log('Login button clicked');
            hideMessage();
            const email = emailInput.value.trim();
            const password = passInput.value;

            if (!email || !password) return showMessage('Please fill in all fields.', 'error');

            btn.disabled = true;
            btn.textContent = 'Logging in…';

            try {
                if (!loginCaptchaToken) { return showMsg("msgBox", "Please complete the human verification.", "error"); }
      const { data, error } = await supabase.auth.signInWithPassword({ email, password, options: { captchaToken: loginCaptchaToken } });

                if (error) {
                    if (error.message && error.message.toLowerCase().includes('email not confirmed')) {
                        pendingEmail = email;
                        document.querySelector('.login-card').classList.add('hidden');
                        document.getElementById('otpVerifyCard').classList.remove('hidden');
                        document.getElementById('otpVerifySub').textContent = 'Enter the 6-digit code sent to ' + email;
                        await supabase.auth.resend({ type: 'signup', email: email });
                        showOtpMsg('Code sent to ' + email, 'info');
                        startOtpTimer();
                        document.getElementById('v1').focus();
                        return;
                    }
                    if (error.message && error.message.toLowerCase().includes('invalid login')) {
                        return showMessage('❌ Invalid email or password. Please try again.', 'error');
                    }
                    return showMessage(error.message, 'error');
                }

                window.location.href = 'bitswap_dashboard.html';

            } catch (err) {
                console.error(err);
                showMessage('Unexpected error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        btn.addEventListener('click', handleLogin);
        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'bitswap_forgot.html';
        });

        (function checkUrlParam() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('verified') === 'pending') {
                showMessage('Your account is created. Please verify your email before logging in.', 'info');
            }
        })();

        let pendingEmail = '';
        let otpTimerInterval = null;

        function showOtpMsg(text, type) {
            const box = document.getElementById('otpMsgBox');
            box.className = 'msg-box ' + type;
            box.textContent = text;
            box.style.display = 'block';
        }

        function startOtpTimer() {
            const btn = document.getElementById('otpResendBtn');
            const el = document.getElementById('otpTimer');
            btn.disabled = true; let s = 60; el.textContent = 'in ' + s + 's';
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            otpTimerInterval = setInterval(function() {
                s--;
                if (s <= 0) { clearInterval(otpTimerInterval); btn.disabled = false; el.textContent = ''; }
                else { el.textContent = 'in ' + s + 's'; }
            }, 1000);
        }

        const vDigits = document.querySelectorAll('.v-digit');
        vDigits.forEach(function(input, i) {
            input.addEventListener('input', function() {
                this.value = this.value.slice(-1).replace(/[^0-9]/g, '');
                if (this.value && i < vDigits.length - 1) vDigits[i+1].focus();
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && i > 0) vDigits[i-1].focus();
            });
        });

        document.getElementById('otpVerifyBtn').addEventListener('click', async function() {
            const token = Array.from(vDigits).map(function(d) { return d.value; }).join('');
            if (token.length < 6) return showOtpMsg('Please enter all 6 digits.', 'error');
            this.disabled = true; this.textContent = 'Verifying...';
            try {
                const { error } = await supabase.auth.verifyOtp({ email: pendingEmail, token: token, type: 'signup' });
                if (error) {
                    this.disabled = false; this.textContent = 'Verify and Login';
                    vDigits.forEach(function(d) { d.value = ''; }); vDigits[0].focus();
                    return showOtpMsg(error.message, 'error');
                }
                showOtpMsg('Email verified! Logging you in...', 'success');
                setTimeout(function() { window.location.href = 'bitswap_dashboard.html'; }, 1500);
            } catch(e) {
                this.disabled = false; this.textContent = 'Verify and Login';
                showOtpMsg('Unexpected error. Please try again.', 'error');
            }
        });

        document.getElementById('otpResendBtn').addEventListener('click', async function() {
            this.disabled = true; document.getElementById('otpTimer').textContent = '...';
            const { error } = await supabase.auth.resend({ type: 'signup', email: pendingEmail });
            if (error) { showOtpMsg('Could not resend: ' + error.message, 'error'); }
            else { showOtpMsg('New code sent!', 'info'); vDigits.forEach(function(d) { d.value = ''; }); vDigits[0].focus(); }
            startOtpTimer();
        });

        document.getElementById('backToLoginLink').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('otpVerifyCard').classList.add('hidden');
            document.querySelector('.login-card').classList.remove('hidden');
        });
    });
</script>
</body>
</html>
