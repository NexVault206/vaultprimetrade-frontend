<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BitSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0D0D0D, #111111); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: #111111; padding: 40px 42px; border-radius: 48px; width: 420px; max-width: 100%; border: 1px solid #2a2a2a; box-shadow: 0 25px 45px rgba(0,0,0,0.6); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo span { color: #10B981; font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .login-card h1 { color: #10B981; font-weight: 700; font-size: 1.8rem; margin-bottom: 6px; }
        .sub { color: #9ca3af; margin-bottom: 24px; font-size: 0.95rem; }
        input { width: 100%; padding: 14px 18px; margin: 6px 0; background: #1a1a1a; border: 1px solid #2d354c; border-radius: 30px; color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(245,166,35,0.15); }
        button { width: 100%; background: #10B981; padding: 15px; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; margin-top: 16px; cursor: pointer; transition: opacity 0.2s; color: #111111; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg-box { padding: 12px 16px; border-radius: 12px; margin-top: 14px; font-size: 0.9rem; display: none; line-height: 1.4; }
        .msg-box.error { background: #2a1515; color: #f87171; display: block; }
        .msg-box.success { background: #152a1a; color: #4ade80; display: block; }
        .msg-box.info { background: #1a263a; color: #93c5fd; display: block; }
        .links { text-align: center; margin-top: 24px; }
        .links a { color: #10B981; text-decoration: none; margin: 0 8px; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        .back-home { text-align: center; margin-top: 20px; }
        .back-home a { color: #10B981; text-decoration: none; font-weight: 500; }
        .back-home a:hover { text-decoration: underline; }
        @media (max-width: 520px) { .login-card { padding: 28px 20px; } }
        .hidden { display: none !important; }
        .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }
        .otp-inputs input { width: 44px; height: 52px; text-align: center; font-size: 1.4rem; font-weight: 700; border-radius: 14px; padding: 0; margin: 0; border: 2px solid #2d354c; background: #1a1a1a; color: #fff; }
        .otp-inputs input:focus { border-color: #10B981; }
        .resend-link { text-align: center; margin-top: 12px; color: #9ca3af; font-size: 0.85rem; }
        .resend-link button { background: none; border: none; color: #10B981; font-weight: 600; cursor: pointer; font-size: 0.85rem; width: auto; padding: 0; margin: 0; text-decoration: underline; }
        .resend-link button:disabled { color: #555; text-decoration: none; }
    </style>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>
<div class="login-card">
    <div class="logo"><span>⬡ BitSwap</span></div>
    <h1>Welcome Back</h1>
    <p class="sub">Login to your BitSwap account</p>

    <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">

    <div class="turnstile-wrap">
      <div class="h-captcha" data-sitekey="48eae7b2-a4ac-470e-9aec-8aa2fd748958" data-callback="onLoginCaptchaSuccess" data-theme="dark"></div>
    </div>
    <script>let loginCaptchaToken = null; function onLoginCaptchaSuccess(token) { loginCaptchaToken = token; }</script>

    <div class="msg-box" id="msgBox"></div>
    <button type="button" id="loginBtn">Login</button>

    <div class="links">
        <a href="bitswap_createaccount.html">Create Account</a> |
        <a href="#" id="forgotLink">Forgot Password?</a>
    </div>
    <div class="back-home"><a href="bitswap_index.html">← Back to Home</a></div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const SUPABASE_URL = 'https://wzphhuaxrgxprjysxzup.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Im30ly7e7WKp8xu-RRxDww_11U0ixuq';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client created (login)');

        const emailInput = document.getElementById('loginEmail');
        const passInput = document.getElementById('loginPassword');
        const btn = document.getElementById('loginBtn');
        const msgBox = document.getElementById('msgBox');

        // Handle logout param or check session
        (async function checkSession() {
            try {
                const params = new URLSearchParams(window.location.search);
                if (params.get('logout') === '1') {
                    await supabase.auth.signOut();
                    // Remove param from URL
                    window.history.replaceState({}, '', window.location.pathname);
                    return;
                }
                const { data: { session } } = await supabase.auth.getSession();
                if (session) window.location.href = 'bitswap_dashboard.html';
            } catch (e) {
                console.warn('Session check error:', e);
            }
        })();

        function showMessage(text, type = 'error') {
            msgBox.className = 'msg-box ' + type;
            msgBox.textContent = text;
            msgBox.style.display = 'block';
        }
        function hideMessage() {
            msgBox.style.display = 'none';
            msgBox.className = 'msg-box';
        }

        async function handleLogin() {
            console.log('Login button clicked');
            hideMessage();
            const email = emailInput.value.trim();
            const password = passInput.value;

            if (!email || !password) return showMessage('Please fill in all fields.', 'error');

            btn.disabled = true;
            btn.textContent = 'Logging in…';

            try {
                if (!loginCaptchaToken) { return showMsg("msgBox", "Please complete the human verification.", "error"); }
      const { data, error } = await supabase.auth.signInWithPassword({ email, password, options: { captchaToken: loginCaptchaToken } });

                if (error) {
                    if (error.message && error.message.toLowerCase().includes('email not confirmed')) {
                        return showMessage('⚠️ Email not confirmed. Please contact support.', 'error');
                    }
                    if (error.message && error.message.toLowerCase().includes('invalid login')) {
                        return showMessage('❌ Invalid email or password. Please try again.', 'error');
                    }
                    return showMessage(error.message, 'error');
                }

                window.location.href = 'bitswap_dashboard.html';

            } catch (err) {
                console.error(err);
                showMessage('Unexpected error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        btn.addEventListener('click', handleLogin);
        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'bitswap_forgot.html';
        });

        (function checkUrlParam() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('verified') === 'pending') {
                showMessage('Your account is created. Please verify your email before logging in.', 'info');
            }
        })();


    });
</script>
</body>
</html>
