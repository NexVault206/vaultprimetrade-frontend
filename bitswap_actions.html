<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Actions | BitSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px 16px 110px 16px;
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #111111;
            --bg-card: #111111;
            --bg-elevated: #141414;
            --border: #1f1f1f;
            --text-primary: #EFF3FC;
            --text-secondary: #94A3B8;
            --accent: #10B981;
            --accent-dark: #047857;
            --accent-hover: #10B981;
            --success: #2BE07E;
            --warning: #FFB347;
            --danger: #FF4D4D;
        }
        body.light {
            --bg-primary: #F1F5F9;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-elevated: #E2E8F0;
            --border: #CBD5E1;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --accent: #047857;
            --accent-dark: #8B6508;
            --accent-hover: #9A7209;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-secondary);
            border-radius: 40px;
            padding: 24px 20px 32px;
            border: 1px solid var(--border);
        }
        .logo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            background: linear-gradient(135deg, var(--accent), #6EE7B7);
            width: 40px; height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 22px;
            color: #0D0D0D;
        }
        .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(120deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-primary);
        }

        .screen { transition: opacity 0.2s; }
        .hidden { display: none; }

        /* Action grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            margin-top: 8px;
            justify-items: center;
        }
        .action-grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: var(--bg-card);
            border-radius: 28px;
            padding: 20px 10px;
            width: 100%;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .action-grid-item:hover {
            background: var(--bg-elevated);
            border-color: var(--accent);
        }
        .action-grid-item .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent);
        }
        .action-grid-item .label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        /* Referral screen */
        .referral-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .referral-link-box {
            background: var(--bg-elevated);
            border-radius: 60px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0;
        }
        .referral-link-box span {
            font-size: 14px;
            word-break: break-all;
            color: var(--text-primary);
        }
        .copy-btn {
            background: var(--accent);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            color: #0D0D0D;
            cursor: pointer;
        }
        .referral-stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .referral-stats div {
            flex: 1;
            background: var(--bg-elevated);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .referral-stats .number {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
        }
        .referral-stats .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 12px 28px;
            border-radius: 44px;
            color: var(--text-primary);
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        .btn-secondary:hover {
            background: var(--bg-elevated);
        }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .message-modal {
            background: var(--bg-card);
            border-radius: 48px;
            max-width: 500px; width: 90%; padding: 28px;
        }
        .close-modal {
            background: var(--bg-secondary); width: 36px; height: 36px;
            border-radius: 40px; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
        }
        .input-field {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 60px; padding: 14px 18px; width: 100%;
            color: var(--text-primary); margin-bottom: 16px;
        }
        .btn-primary {
            background: var(--accent); border: none; padding: 12px 28px;
            border-radius: 44px; font-weight: 700; color: #0D0D0D; cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .toast-msg {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: var(--bg-secondary); color: var(--text-primary);
            padding: 8px 18px; border-radius: 40px;
            font-size: 13px; z-index: 200;
            border: 1px solid var(--border);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
        }
        .back-link i { margin-right: 6px; }
        .back-link:hover { color: var(--text-primary); }
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;
            max-width:600px;background:var(--bg-primary);border-top:1px solid var(--border);
            display:flex;justify-content:space-around;padding:10px 8px;
            border-radius:24px 24px 0 0;z-index:100;}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
            font-size:10px;color:var(--text-secondary);cursor:pointer;text-decoration:none;
            padding:4px 8px;border-radius:12px;transition:0.2s;min-width:44px;}
        .nav-item i{font-size:20px;}
        .nav-item.active,.nav-item:hover{color:var(--accent);}

        @media (max-width: 480px) {
            .action-grid { grid-template-columns: repeat(2, 1fr); }
            .referral-stats { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div class="logo-header">
        <div class="logo">
            <div class="logo-icon">B</div>
            <div class="logo-text">BitSwap</div>
        </div>
        <div class="header-actions">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
        </div>
    </div>

    <!-- ACTIONS SCREEN -->
    <div id="actionsScreen" class="screen">
        <h2 style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
            <i class="fas fa-cogs"></i> Actions
        </h2>
        <div class="action-grid">
            <div class="action-grid-item" id="actionInvest">
                <div class="icon-circle"><i class="fas fa-chart-line"></i></div>
                <span class="label">Invest</span>
            </div>
            <div class="action-grid-item" id="actionWithdraw">
                <div class="icon-circle"><i class="fas fa-arrow-up"></i></div>
                <span class="label">Withdraw</span>
            </div>
            <div class="action-grid-item" id="actionRefer">
                <div class="icon-circle"><i class="fas fa-user-plus"></i></div>
                <span class="label">Refer</span>
            </div>
            <div class="action-grid-item" id="actionSupport">
                <div class="icon-circle"><i class="fas fa-headset"></i></div>
                <span class="label">Support</span>
            </div>
            <div class="action-grid-item" id="actionNews">
                <div class="icon-circle"><i class="fas fa-newspaper"></i></div>
                <span class="label">News</span>
            </div>
        </div>
    </div>

    <!-- REFERRAL SCREEN (hidden by default) -->
    <div id="referScreen" class="screen hidden">
        <span class="back-link" id="backToActions"><i class="fas fa-arrow-left"></i> Back</span>
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:20px;">
            <h2 style="display:flex; align-items:center; gap:12px;">
                <i class="fas fa-user-plus" style="color:var(--accent);"></i> Refer & Earn
            </h2>
        </div>
        <div class="referral-card">
            <p style="font-size:14px; color:var(--text-secondary); margin-bottom:16px;">Earn commission when someone signs up using your link</p>
            <div style="font-weight:600; font-size:16px; margin-bottom:8px;">Your Referral Link</div>
            <div class="referral-link-box">
                <span id="referralLinkFull"></span>
                <button class="copy-btn" id="copyReferralLinkBtn">Copy</button>
            </div>
            <div class="referral-stats">
                <div>
                    <div class="number" id="totalReferralsCount">0</div>
                    <div class="label">Total Referrals</div>
                </div>
                <div>
                    <div class="number" id="referralEarnings">$0.00</div>
                    <div class="label">Earnings</div>
                </div>
            </div>
        </div>
    </div>
    <!-- MESSAGE MODAL -->
    <div id="adminMessageModal" class="modal-overlay">
        <div class="message-modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3><i class="fas fa-envelope"></i> Message Admin</h3>
                <div id="closeMessageModal" class="close-modal"><i class="fas fa-times"></i></div>
            </div>
            <input type="text" id="msgSubject" class="input-field" placeholder="Subject">
            <textarea id="msgBody" class="input-field" rows="4" placeholder="Your message..."></textarea>
            <button id="sendMessageBtn" class="btn-primary">Send Message</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="bitswap_dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="bitswap_deposit.html" class="nav-item"><i class="fas fa-arrow-down"></i><span>Deposit</span></a>
    <a href="bitswap_withdraw.html" class="nav-item"><i class="fas fa-arrow-up"></i><span>Withdraw</span></a>
    <a href="bitswap_plans.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Plans</span></a>
    <a href="bitswap_actions.html" class="nav-item active"><i class="fas fa-cogs"></i><span>Actions</span></a>
    <a href="bitswap_history.html" class="nav-item"><i class="fas fa-clock"></i><span>History</span></a>
    <a href="bitswap_profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
</nav>

<script>
    // ---------- MOCK USER ----------
    // In a real app, this would come from localStorage / API.
    // We simulate a user with a first name for the referral link.
    const currentUser = {
        name: 'Peter Oyelade',
        email: 'peter@example.com',
        balance: 670.78,
        isVerified: true,
        memberSince: '2024-01-15'
    };

    // Helper: get first name
    function getFirstName(fullName) {
        return fullName.split(' ')[0];
    }

    // Generate referral link
    function generateReferralLink() {
        const firstName = getFirstName(currentUser.name);
        return `https://app.bitswap.com/ref/${firstName}`;
    }

    // Update referral UI
    function updateReferralUI() {
        const link = generateReferralLink();
        document.getElementById('referralLinkFull').innerText = link;
        // Mock stats – you could pull these from localStorage
        document.getElementById('totalReferralsCount').innerText = '0';
        document.getElementById('referralEarnings').innerText = '$0.00';
    }

    // ---------- SCREEN SWITCHING ----------
    function showScreen(screenId) {
        document.getElementById('actionsScreen').classList.toggle('hidden', screenId !== 'actions');
        document.getElementById('referScreen').classList.toggle('hidden', screenId !== 'refer');
    }

    // ---------- TOAST ----------
    function showToast(msg) {
        let toast = document.querySelector('.toast-msg');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    // ---------- EVENT LISTENERS ----------
    document.addEventListener('DOMContentLoaded', function() {
        // Action grid buttons
        document.getElementById('actionInvest').addEventListener('click', function() {
            window.location.href = 'bitswap_plans.html';
        });
        document.getElementById('actionWithdraw').addEventListener('click', function() {
            window.location.href = 'bitswap_withdraw.html';
        });
        document.getElementById('actionRefer').addEventListener('click', function() {
            showScreen('refer');
            updateReferralUI();
        });
        document.getElementById('actionSupport').addEventListener('click', function() {
            document.getElementById('adminMessageModal').classList.add('active');
        });
        document.getElementById('actionNews').addEventListener('click', function() {
            showToast('📰 News section coming soon.');
        });

        // Back from referral
        document.getElementById('backToActions').addEventListener('click', function() {
            showScreen('actions');
        });

        // Copy referral link
        document.getElementById('copyReferralLinkBtn').addEventListener('click', function() {
            const link = document.getElementById('referralLinkFull').innerText;
            navigator.clipboard.writeText(link).then(() => {
                showToast('Referral link copied!');
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = link;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                input.remove();
                showToast('Referral link copied!');
            });
        });

        // Message modal
        document.getElementById('closeMessageModal').addEventListener('click', function() {
            document.getElementById('adminMessageModal').classList.remove('active');
        });
        document.getElementById('adminMessageModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
        document.getElementById('sendMessageBtn').addEventListener('click', function() {
            const subject = document.getElementById('msgSubject').value.trim();
            const body = document.getElementById('msgBody').value.trim();
            if (!subject || !body) {
                showToast('Please fill in both subject and message.');
                return;
            }
            // In a real app, send to backend or email
            showToast('✅ Your message has been sent to admin.');
            document.getElementById('adminMessageModal').classList.remove('active');
            document.getElementById('msgSubject').value = '';
            document.getElementById('msgBody').value = '';
        });

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', function() {
            document.body.classList.toggle('light');
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        // Show actions screen by default
        showScreen('actions');
    });
</script>
</body>
</html>
