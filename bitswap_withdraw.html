<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Withdrawal | NexVaultTrade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 20px 100px; transition: background 0.3s; }
        :root {
            --bg-body: #0B0F16;
            --bg-container: #121924;
            --bg-card: #0D151F;
            --bg-card-alt: #0E151F;
            --bg-input: #0A111A;
            --bg-step: #1F2C3A;
            --border-color: #263340;
            --text-primary: #EFF3FC;
            --text-secondary: #97B1CF;
            --text-muted: #7B98BB;
            --accent: #10B981;
            --accent-gold: #FFE3A3;
            --success: #6FCF97;
            --success-bg: #1C3D2F;
            --danger: #FF6B6B;
            --danger-bg: #401E2C;
            --danger-text: #FFBFBF;
            --btn-primary: #1F6E43;
            --shadow: 0 25px 45px -12px rgba(0,0,0,0.6);
            --step-active-bg: #2E6A4E;
            --step-completed-bg: #1F6E48;
            --lock-bg: #2E1E28;
            --lock-text: #FF8A7A;
        }
        body.light {
            --bg-body: #F3F6FA;
            --bg-container: #FFFFFF;
            --bg-card: #F0F4F9;
            --bg-card-alt: #E8EDF3;
            --bg-input: #FFFFFF;
            --bg-step: #E2E8F0;
            --border-color: #D1D9E6;
            --text-primary: #1A1D2E;
            --text-secondary: #4A5A72;
            --text-muted: #6A7F9A;
            --accent: #059669;
            --accent-gold: #A67C1E;
            --success: #10B981;
            --success-bg: #D1FAE5;
            --danger: #EF4444;
            --danger-bg: #FEE2E2;
            --danger-text: #991B1B;
            --btn-primary: #1F6E43;
            --shadow: 0 10px 30px rgba(0,0,0,0.06);
            --step-active-bg: #2E6A4E;
            --step-completed-bg: #1F6E48;
            --lock-bg: #FEE2E2;
            --lock-text: #DC2626;
        }
        .withdrawal-container { max-width: 620px; width: 100%; background: var(--bg-container); border-radius: 40px; box-shadow: var(--shadow); overflow: hidden; }
        .screen { padding: 28px 26px 34px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .theme-toggle { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 40px; padding: 8px 14px; cursor: pointer; font-size: 18px; color: var(--text-primary); transition: 0.2s; }
        .balance-header { background: var(--bg-card-alt); border-radius: 32px; padding: 20px 24px; margin-bottom: 28px; border: 1px solid var(--border-color); }
        .greeting { font-size: 1.2rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; }
        .balance-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; }
        .total-balance { font-size: 2rem; font-weight: 800; color: var(--accent-gold); letter-spacing: -0.3px; }
        .lock-badge { background: var(--lock-bg); color: var(--lock-text); padding: 6px 14px; border-radius: 60px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .percentage-change { margin-top: 8px; font-size: 0.75rem; color: var(--text-muted); }
        .error-msg { background: var(--danger-bg); border-left: 5px solid var(--danger); padding: 14px 18px; border-radius: 24px; color: var(--danger-text); font-size: 0.8rem; margin: 20px 0; }
        .red-caption { background: var(--danger-bg); border: 1px solid var(--danger); padding: 16px 20px; border-radius: 20px; color: var(--danger-text); font-size: 0.9rem; font-weight: 500; margin: 16px 0; display: flex; align-items: center; gap: 12px; }
        .red-caption i { color: var(--danger); font-size: 1.4rem; }
        .steps-wrapper { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .step-item { flex: 1; text-align: center; position: relative; z-index: 2; }
        .step-circle { width: 48px; height: 48px; background: var(--bg-step); border-radius: 60px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 1.2rem; font-weight: 600; color: var(--text-secondary); transition: 0.2s; border: 1px solid var(--border-color); }
        .step-circle.active { background: var(--step-active-bg); color: white; border-color: var(--success); box-shadow: 0 0 0 3px rgba(111,207,151,0.3); }
        .step-circle.completed { background: var(--step-completed-bg); color: white; border-color: var(--success); }
        .step-circle.completed i { font-size: 1.2rem; }
        .step-label { font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); }
        .step-label.active-label { color: var(--text-primary); font-weight: 600; }
        .form-card { background: var(--bg-card); border-radius: 28px; padding: 24px; margin: 8px 0 24px; border: 1px solid var(--border-color); }
        .method-toggle { display: flex; gap: 14px; margin-bottom: 24px; }
        .method-option { flex: 1; background: var(--bg-step); border-radius: 60px; padding: 12px 0; text-align: center; font-weight: 600; color: var(--text-secondary); cursor: pointer; border: 1px solid var(--border-color); transition: 0.2s; }
        .method-option.active-method { background: #2C5680; color: white; border-color: #5F9FD0; }
        .input-field { margin-bottom: 18px; }
        .input-field label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        .input-field input, .input-field select { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 60px; padding: 14px 18px; color: var(--text-primary); font-size: 0.9rem; outline: none; }
        .input-field input:focus { border-color: #5B8BB4; }
        .amount-input { font-size: 1.1rem; font-weight: 500; }
        .submit-btn { background: linear-gradient(95deg, var(--btn-primary), #0F4C2D); width: 100%; border: none; padding: 14px; border-radius: 60px; font-weight: 700; font-size: 1rem; color: white; margin-top: 12px; cursor: pointer; transition: 0.2s; }
        .submit-btn:active { transform: scale(0.97); }
        .timer-block { background: var(--bg-card-alt); border-radius: 28px; padding: 20px; text-align: center; margin: 20px 0; }
        .timer-digits { font-size: 2.4rem; font-weight: 800; font-family: monospace; background: var(--bg-step); display: inline-block; padding: 8px 24px; border-radius: 60px; color: var(--success); letter-spacing: 2px; }
        .admin-note { font-size: 0.7rem; color: var(--text-muted); margin-top: 12px; }
        .inline-button { background: #2C4A6E; border: none; padding: 8px 16px; border-radius: 30px; color: white; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .inline-button:hover { opacity: 0.8; }
        hr { margin: 18px 0; border-color: var(--border-color); }
        .confirmation-steps { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
        .confirmation-item { display: flex; align-items: center; gap: 14px; background: var(--bg-card-alt); padding: 12px 18px; border-radius: 20px; border: 1px solid var(--border-color); }
        .confirmation-item .icon.success { color: var(--success); }
        .confirmation-item .label { flex: 1; font-weight: 500; color: var(--text-primary); }
        .confirmation-item .value { font-weight: 600; color: var(--accent-gold); }
        .success-box { background: var(--success-bg); border: 1px solid var(--success); border-radius: 24px; padding: 30px; text-align: center; margin: 20px 0; }
        .success-box .big-check { font-size: 4rem; color: var(--success); margin-bottom: 12px; }
        .success-box h3 { color: var(--text-primary); font-size: 1.4rem; margin-bottom: 8px; }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 620px; background: var(--bg-container); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 8px; border-radius: 24px 24px 0 0; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: var(--text-muted); cursor: pointer; text-decoration: none; padding: 4px 8px; border-radius: 12px; min-width: 44px; }
        .nav-item i { font-size: 20px; }
        .nav-item.active, .nav-item:hover { color: var(--accent); }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--bg-card); color: var(--text-primary); padding: 12px 24px; border-radius: 60px; font-size: 14px; z-index: 200; border: 1px solid var(--border-color); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        @media (max-width: 480px) { .screen { padding: 20px 16px 28px; } .balance-row { flex-direction: column; align-items: flex-start; gap: 8px; } .step-circle { width: 40px; height: 40px; font-size: 1rem; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="withdrawal-container" id="withdrawApp"></div>
<nav class="bottom-nav">
    <a href="bitswap_dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="bitswap_deposit.html" class="nav-item"><i class="fas fa-arrow-down"></i><span>Deposit</span></a>
    <a href="bitswap_withdraw.html" class="nav-item active"><i class="fas fa-arrow-up"></i><span>Withdraw</span></a>
    <a href="bitswap_plans.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Plans</span></a>
    <a href="bitswap_actions.html" class="nav-item"><i class="fas fa-cogs"></i><span>Actions</span></a>
    <a href="bitswap_history.html" class="nav-item"><i class="fas fa-clock"></i><span>History</span></a>
    <a href="bitswap_profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
</nav>

<script>
    // ---------- SUPABASE ----------
    const SUPABASE_URL = 'https://wzphhuaxrgxprjysxzup.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6cGhodWF4cmd4cHJqeXN4enVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODE0MjYsImV4cCI6MjEwMDI1NzQyNn0.JGY2QohM1o262e6coRzKEzoQGjI1L5ruHQ7t4Gi40w';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ---------- CRYPTO COINS ----------
    const cryptoCoins = [
        { value: 'bitcoin', label: 'Bitcoin (BTC)' },
        { value: 'ethereum', label: 'Ethereum (ETH)' },
        { value: 'usdt_erc20', label: 'USDT (ERC20)' },
        { value: 'usdt_trc20', label: 'USDT (TRC20)' },
        { value: 'bnb', label: 'BNB (BSC)' },
        { value: 'solana', label: 'Solana (SOL)' },
        { value: 'xrp', label: 'XRP' },
        { value: 'litecoin', label: 'Litecoin (LTC)' }
    ];

    // ---------- STATE ----------
    let userBalance = 0;
    let isBalanceLocked = false;          // from requires_additional_verification
    let isTierUpgraded = false;          // from is_verified
    let isFirstWithdrawal = true;
    let withdrawalInProgress = false;
    let currentStep = 0;                 // 0: Init, 1: Submit, 2: Verify, 3: Processing (30min), 4: Locked, 5: UnlockLoading, 6: Confirmation (1hr), 7: Success
    let selectedMethod = 'bank';
    let withdrawalAmount = '';
    let bankDetails = { bankName: '', accountNumber: '', holderName: '' };
    let cryptoAddress = '';
    let selectedCoin = 'bitcoin';
    let verifyTimer = null;
    let processingInterval = null;
    let processingEndTime = null;
    let confirmInterval = null;
    let confirmEndTime = null;
    let isVerifying = false;

    const appContainer = document.getElementById('withdrawApp');

    // ---------- HELPERS ----------
    function formatMoney(amount) {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(amount);
    }

    function showToast(msg) {
        let toast = document.querySelector('.toast-msg');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function saveState() {
        localStorage.setItem('nexvault_balance_locked', isBalanceLocked);
        localStorage.setItem('nexvault_balance', userBalance);
        localStorage.setItem('nexvault_first_withdrawal', isFirstWithdrawal);
        localStorage.setItem('nexvault_tier_upgraded', isTierUpgraded);
    }

    // ---------- FETCH USER DATA ----------
    async function fetchUserData() {
        try {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.href = 'bitswap_login.html';
                return;
            }
            const { data: profile, error } = await sb.from('profiles')
                .select('balance, requires_additional_verification, is_verified')
                .eq('id', session.user.id)
                .single();
            if (error) throw error;
            userBalance = profile.balance || 0;
            isBalanceLocked = profile.requires_additional_verification === true;
            isTierUpgraded = profile.is_verified === true;
            saveState();
            // If currently in step 0 and lock status has changed, re-render
            if (currentStep === 0 || currentStep === 4) {
                renderWithdrawal();
            }
        } catch(e) {
            console.warn('Could not fetch user data:', e);
            // fallback to localStorage
            const savedLock = localStorage.getItem('nexvault_balance_locked');
            if (savedLock !== null) isBalanceLocked = savedLock === 'true';
            const savedBalance = localStorage.getItem('nexvault_balance');
            if (savedBalance !== null && !isNaN(parseFloat(savedBalance))) userBalance = parseFloat(savedBalance);
            const savedFirst = localStorage.getItem('nexvault_first_withdrawal');
            if (savedFirst !== null) isFirstWithdrawal = savedFirst === 'true';
            const savedTier = localStorage.getItem('nexvault_tier_upgraded');
            if (savedTier !== null) isTierUpgraded = savedTier === 'true';
        }
    }

    // ---------- ADMIN UPGRADE TIER ----------
    async function upgradeTier() {
        try {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { showToast('Please log in again.'); return; }
            const { error } = await sb.from('profiles')
                .update({ is_verified: true, requires_additional_verification: false })
                .eq('id', session.user.id);
            if (error) throw error;
            isTierUpgraded = true;
            isBalanceLocked = false;
            saveState();
            showToast('✅ Tier upgraded successfully! Withdrawals are now unlocked.');
            currentStep = 5; // unlock loading
            renderWithdrawal();
            setTimeout(() => {
                currentStep = 6; // confirmation
                renderWithdrawal();
                startConfirmationCountdown();
            }, 30000);
        } catch(e) {
            showToast('Error upgrading tier: ' + e.message);
        }
    }

    // ---------- RESET FLOW ----------
    function resetFlow() {
        if (verifyTimer) clearTimeout(verifyTimer);
        if (processingInterval) clearInterval(processingInterval);
        if (confirmInterval) clearInterval(confirmInterval);
        verifyTimer = null;
        processingInterval = null;
        processingEndTime = null;
        confirmInterval = null;
        confirmEndTime = null;
        isVerifying = false;
        withdrawalInProgress = false;
        currentStep = 0;
        withdrawalAmount = '';
        bankDetails = { bankName: '', accountNumber: '', holderName: '' };
        cryptoAddress = '';
        renderWithdrawal();
    }

    // ---------- STEP 1: INITIATE ----------
    function initiateWithdrawal() {
        if (isBalanceLocked) {
            showToast("Your balance is locked. Please contact admin.");
            return;
        }
        if (withdrawalInProgress) return;
        withdrawalInProgress = true;
        currentStep = 1;
        renderWithdrawal();
    }

    // ---------- STEP 2: SUBMIT DETAILS ----------
    function validateSubmitDetails() {
        const amountNum = parseFloat(withdrawalAmount);
        if (isNaN(amountNum) || amountNum <= 0) return { valid: false, error: 'Please enter a valid amount' };
        if (amountNum > userBalance) return { valid: false, error: `Insufficient balance. Available: ${formatMoney(userBalance)}` };
        if (amountNum < 10) return { valid: false, error: 'Minimum withdrawal amount is $10.00' };
        if (selectedMethod === 'bank') {
            if (!bankDetails.bankName.trim()) return { valid: false, error: 'Bank name required' };
            if (!bankDetails.accountNumber.trim()) return { valid: false, error: 'Account number required' };
            if (!bankDetails.holderName.trim()) return { valid: false, error: 'Account holder name required' };
        } else {
            if (!cryptoAddress.trim()) return { valid: false, error: 'Wallet address required' };
        }
        return { valid: true, amount: amountNum };
    }

    function onSubmitDetails() {
        const validation = validateSubmitDetails();
        if (!validation.valid) {
            showToast(validation.error);
            return;
        }
        currentStep = 2;
        renderWithdrawal();
        isVerifying = true;
        verifyTimer = setTimeout(() => {
            isVerifying = false;
            currentStep = 3;
            renderWithdrawal();
            startProcessingWithdrawal(validation.amount);
        }, 30000);
    }

    // ---------- STEP 3: PROCESSING (30min) ----------
    function startProcessingWithdrawal(amount) {
        const durationMs = 30 * 60 * 1000;
        processingEndTime = Date.now() + durationMs;
        processingInterval = setInterval(() => {
            if (!processingEndTime || currentStep !== 3) {
                if (processingInterval) clearInterval(processingInterval);
                return;
            }
            const remaining = processingEndTime - Date.now();
            if (remaining <= 0) {
                clearInterval(processingInterval);
                processingInterval = null;
                // Lock account after first withdrawal attempt
                isBalanceLocked = true;
                isFirstWithdrawal = false;
                (async () => {
                    const { data: { session } } = await sb.auth.getSession();
                    if (session) {
                        await sb.from('profiles').update({ requires_additional_verification: true }).eq('id', session.user.id);
                    }
                })();
                saveState();
                currentStep = 4; // Locked state with red caption
                renderWithdrawal();
                return;
            }
            renderWithdrawal();
        }, 1000);
        renderWithdrawal();
    }

        // ---------- STEP 6: CONFIRMATION (1hr) ----------
    function startConfirmationCountdown() {
        const durationMs = 60 * 60 * 1000;
        confirmEndTime = Date.now() + durationMs;
        confirmInterval = setInterval(() => {
            if (!confirmEndTime || currentStep !== 6) {
                if (confirmInterval) clearInterval(confirmInterval);
                return;
            }
            const remaining = confirmEndTime - Date.now();
            if (remaining <= 0) {
                clearInterval(confirmInterval);
                confirmInterval = null;
                // Success: deduct balance
                const amountNum = parseFloat(withdrawalAmount);
                if (!isNaN(amountNum) && userBalance >= amountNum) {
                    userBalance -= amountNum;
                    (async () => {
                        try {
                            const { data: { session } } = await sb.auth.getSession();
                            if (session) {
                                await sb.from('profiles').update({ balance: userBalance }).eq('id', session.user.id);
                            }
                        } catch(e) {}
                        saveState();
                    })();
                    currentStep = 7;
                    renderWithdrawal();
                    showToast(`✅ Withdrawal of ${formatMoney(amountNum)} completed successfully!`);
                } else {
                    showToast("Error: insufficient balance or amount invalid.");
                    resetFlow();
                }
                return;
            }
            renderWithdrawal();
        }, 1000);
        renderWithdrawal();
    }

    // ---------- RENDER UI ----------
    function renderWithdrawal() {
        if (!appContainer) return;

        const balanceDisplay = formatMoney(userBalance);
        const canWithdraw = !isBalanceLocked;   // only check lock status, not tier

        // Step statuses for progress circles
        let stepStatus = [0, 0, 0, 0];
        if (currentStep === 1) { stepStatus[0] = 1; }
        else if (currentStep === 2) { stepStatus[0] = 2; stepStatus[1] = 1; }
        else if (currentStep === 3) { stepStatus[0] = 2; stepStatus[1] = 2; stepStatus[2] = 1; }
        else if (currentStep === 4 || currentStep === 5 || currentStep === 6) { stepStatus[0] = 2; stepStatus[1] = 2; stepStatus[2] = 2; stepStatus[3] = 1; }
        else if (currentStep === 7) { stepStatus = [2,2,2,2]; }

        const steps = [
            { label: "Initiation" },
            { label: "Submit details" },
            { label: "Verifying details" },
            { label: "Processing withdrawal" }
        ];

        let stepsHtml = `<div class="steps-wrapper">`;
        steps.forEach((step, idx) => {
            let circleClass = 'step-circle';
            if (stepStatus[idx] === 2) circleClass += ' completed';
            else if (stepStatus[idx] === 1) circleClass += ' active';
            let labelClass = 'step-label';
            if (stepStatus[idx] === 1) labelClass += ' active-label';
            let inner = stepStatus[idx] === 2 ? `<i class="fas fa-check"></i>` : `<span>${idx+1}</span>`;
            stepsHtml += `
                <div class="step-item">
                    <div class="${circleClass}">${inner}</div>
                    <div class="${labelClass}">${step.label}</div>
                </div>
            `;
        });
        stepsHtml += `</div>`;

        // Header
        let headerHtml = `
            <div class="header-bar">
                <div></div>
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
            </div>
            <div class="balance-header">
                <div class="greeting">Hello👋</div>
                <div class="balance-row">
                    <span class="total-balance">${balanceDisplay}</span>
                    ${isBalanceLocked ? `<span class="lock-badge"><i class="fas fa-lock"></i> LOCKED</span>` : ''}
                </div>
                <div class="percentage-change">🔒 (4%) Last Week</div>
                ${isBalanceLocked ? `<div class="error-msg" style="margin-top: 12px; font-size:0.75rem;"><i class="fas fa-lock"></i> Balance locked. Please contact admin to unlock.</div>` : ''}
            </div>
        `;

        let mainHtml = '';

        // Step 0: Init
        if (currentStep === 0) {
            if (canWithdraw) {
                mainHtml = `
                    <div class="form-card">
                        <div style="text-align: center; margin-bottom: 20px;">
                            <i class="fas fa-hand-holding-usd" style="font-size: 2.5rem; color: var(--success);"></i>
                            <p style="margin-top: 10px; color: var(--text-secondary);">You can withdraw crypto or fiat with your preferred method.</p>
                        </div>
                        <button class="submit-btn" id="initiateBtn"><i class="fas fa-arrow-right"></i> Initiate Withdrawal</button>
                    </div>
                `;
            } else {
                mainHtml = `
                    <div class="form-card" style="text-align:center; padding: 30px 20px;">
                        <i class="fas fa-lock" style="font-size: 2.5rem; color: var(--danger);"></i>
                        <p style="margin-top: 12px; font-weight: 600; color: var(--text-secondary);">Withdrawals are currently locked.</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">Please contact admin to unlock your account.</p>
                    </div>
                `;
            }
        }
        // Step 1: Submit details
        else if (currentStep === 1) {
            const isBankActive = selectedMethod === 'bank';
            const coinOptions = cryptoCoins.map(c => `
                <option value="${c.value}" ${c.value === selectedCoin ? 'selected' : ''}>${c.label}</option>
            `).join('');

            mainHtml = `
                <div class="form-card">
                    <div class="method-toggle">
                        <div class="method-option ${isBankActive ? 'active-method' : ''}" data-method="bank">🏦 Bank Transfer</div>
                        <div class="method-option ${!isBankActive ? 'active-method' : ''}" data-method="crypto">🪙 Crypto Wallet</div>
                    </div>
                    <div class="input-field">
                        <label>Amount (USD)</label>
                        <input type="number" id="amountInput" class="amount-input" placeholder="Min $10" value="${withdrawalAmount}" step="10">
                    </div>
                    ${isBankActive ? `
                        <div class="input-field"><label>Bank Name</label><input type="text" id="bankName" placeholder="e.g. Chase" value="${bankDetails.bankName}"></div>
                        <div class="input-field"><label>Account Number</label><input type="text" id="accountNumber" placeholder="Account number" value="${bankDetails.accountNumber}"></div>
                        <div class="input-field"><label>Account Holder Name</label><input type="text" id="holderName" placeholder="Full name" value="${bankDetails.holderName}"></div>
                    ` : `
                        <div class="input-field">
                            <label>Select Coin / Currency</label>
                            <select id="coinSelect">${coinOptions}</select>
                        </div>
                        <div class="input-field">
                            <label>Wallet Address</label>
                            <input type="text" id="cryptoAddress" placeholder="Enter your wallet address" value="${cryptoAddress}">
                        </div>
                    `}
                    <button class="submit-btn" id="submitDetailsBtn">Submit Details</button>
                </div>
            `;
        }
        // Step 2: Verifying
        else if (currentStep === 2) {
            mainHtml = `
                <div class="form-card" style="text-align: center;">
                    <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: #FFD966; margin-bottom: 16px;"></i>
                    <h4 style="color: var(--text-primary);">Verifying your withdrawal details</h4>
                    <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 8px;">Please wait, we are validating the information...</p>
                    <div class="admin-note" style="margin-top: 20px;"><i class="fas fa-shield-alt"></i> Estimated time: ~30 seconds</div>
                </div>
            `;
        }
        // Step 3: Processing (30min)
        else if (currentStep === 3) {
            const timerActive = processingEndTime && processingEndTime > Date.now();
            let timerDisplay = '';
            if (timerActive) {
                const remaining = processingEndTime - Date.now();
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                timerDisplay = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }
            mainHtml = `
                <div class="timer-block">
                    <i class="fas fa-hourglass-half" style="font-size: 1.5rem; color: #9BC0E8;"></i>
                    <div style="margin: 10px 0 12px; font-weight: 600; color: var(--text-primary);">Admin is processing withdrawal</div>
                    <div class="timer-digits">${timerDisplay}</div>
                    <div class="admin-note">⏳ Estimated 30 minutes for confirmation</div>
                </div>
                <div class="info-message" style="background:var(--bg-card-alt); padding:12px; border-radius:24px; font-size:0.75rem; color:var(--text-secondary);">
                    <i class="fas fa-clock"></i> Please do not close the page. After timer finishes, withdrawal will be finalized.
                </div>
                <button class="inline-button" id="cancelProcessingBtn" style="margin-top: 16px;">Cancel Withdrawal</button>
            `;
        }
        // Step 4: Locked (after 30min) – shows red caption
        else if (currentStep === 4) {
            mainHtml = `
                <div class="red-caption">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span><strong>Additional verification is required</strong> to upgrade your account tier and restore full access to your account.</span>
                </div>
                <div style="display: flex; justify-content: center; margin: 16px 0 8px;">
                    <span class="lock-badge" style="font-size:1rem; padding: 10px 20px;"><i class="fas fa-lock"></i> LOCKED</span>
                </div>
                <p style="text-align:center; color: var(--text-muted); font-size:0.8rem; margin-top: 16px;">
                    Please contact the admin to upgrade your tier and unlock your account.
                </p>
                <!-- Admin button – in production, this would be hidden from normal users -->
                <div style="margin-top: 20px; text-align: center;">
                    <button class="inline-button" id="adminUpgradeBtn" style="background: #D4AF37; color: #0A0E17; padding: 12px 24px; font-weight: 700;">
                        <i class="fas fa-gem"></i> Admin: Upgrade Tier
                    </button>
                </div>
                <div style="margin-top: 12px; text-align: center;">
                    <button class="inline-button" id="resetFromFailedBtn" style="background: var(--bg-step);">Reset</button>
                </div>
            `;
        }
        // Step 5: Unlock loading (30s after admin upgrade)
        else if (currentStep === 5) {
            mainHtml = `
                <div class="form-card" style="text-align: center;">
                    <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: var(--accent); margin-bottom: 16px;"></i>
                    <h4 style="color: var(--text-primary);">✅ Tier upgraded successfully!</h4>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 8px;">Withdrawals are now unlocked. Please wait...</p>
                    <div class="admin-note" style="margin-top: 20px;">⏳ Unlocking your account...</div>
                </div>
            `;
        }
        // Step 6: Confirmation (1hr) – green ticks
        else if (currentStep === 6) {
            const timerActive = confirmEndTime && confirmEndTime > Date.now();
            let timerDisplay = '';
            if (timerActive) {
                const remaining = confirmEndTime - Date.now();
                const hours = Math.floor(remaining / 3600000);
                const minutes = Math.floor((remaining % 3600000) / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                timerDisplay = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            } else {
                timerDisplay = '00:00:00';
            }
            const displayAddr = selectedMethod === 'bank' ? bankDetails.bankName : (cryptoAddress.slice(0,6)+'...');
            mainHtml = `
                <div style="margin-bottom: 20px; text-align: center;">
                    <i class="fas fa-check-circle" style="color: var(--success); font-size: 2rem;"></i>
                    <h4 style="color: var(--text-primary); margin-top: 6px;">Confirming withdrawal</h4>
                </div>
                <div class="confirmation-steps">
                    <div class="confirmation-item">
                        <span class="icon success"><i class="fas fa-check-circle"></i></span>
                        <span class="label">Recipient</span>
                        <span class="value">${displayAddr}</span>
                    </div>
                    <div class="confirmation-item">
                        <span class="icon success"><i class="fas fa-check-circle"></i></span>
                        <span class="label">Amount</span>
                        <span class="value">${formatMoney(parseFloat(withdrawalAmount))}</span>
                    </div>
                    <div class="confirmation-item">
                        <span class="icon success"><i class="fas fa-check-circle"></i></span>
                        <span class="label">Summary</span>
                        <span class="value">✅ Approved</span>
                    </div>
                </div>
                <div class="timer-block">
                    <div style="margin-bottom: 8px; color: var(--text-secondary);">Confirming information, please wait...</div>
                    <div class="timer-digits">${timerDisplay}</div>
                    <div class="admin-note">⏳ Estimated 1 hour for final confirmation</div>
                </div>
                <button class="inline-button" id="cancelConfirmBtn" style="margin-top: 12px;">Cancel</button>
            `;
        }
        // Step 7: Success – big verified checkmark
        else if (currentStep === 7) {
            mainHtml = `
                <div class="success-box">
                    <div class="big-check"><i class="fas fa-check-circle"></i></div>
                    <h3>✅ Verified</h3>
                    <p>Your withdrawal of <strong>${formatMoney(parseFloat(withdrawalAmount))}</strong> has been completed successfully!</p>
                    <p style="margin-top: 12px; font-size: 0.8rem;">Funds have been sent to your selected wallet/bank.</p>
                </div>
                <button class="submit-btn" id="newWithdrawalBtn">Make New Withdrawal</button>
            `;
        }

        let fullHtml = `
            <div class="screen">
                ${headerHtml}
                ${stepsHtml}
                ${mainHtml}
                <hr>
                <div style="display: flex; justify-content: center; align-items: center; margin-top: 12px;">
                    <span style="font-size:0.7rem; color: var(--text-muted);"><i class="fas fa-shield-alt"></i> Secure withdrawals</span>
                </div>
            </div>
        `;

        appContainer.innerHTML = fullHtml;
        attachWithdrawalEvents();
    }

    // ---------- EVENT BINDING ----------
    function attachWithdrawalEvents() {
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            // Apply saved theme to body + sync icon after every re-render (screen is rebuilt via innerHTML)
            if (localStorage.getItem('nexvault_theme') === 'light') {
                document.body.classList.add('light');
                const icon = themeToggle.querySelector('i');
                if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light');
                const icon = themeToggle.querySelector('i');
                icon.classList.toggle('fa-moon');
                icon.classList.toggle('fa-sun');
                localStorage.setItem('nexvault_theme', document.body.classList.contains('light') ? 'light' : 'dark');
            });
        }

        const initiateBtn = document.getElementById('initiateBtn');
        if (initiateBtn) initiateBtn.addEventListener('click', () => initiateWithdrawal());

        // Method switch
        const methodBank = document.querySelector('[data-method="bank"]');
        const methodCrypto = document.querySelector('[data-method="crypto"]');
        if (methodBank) methodBank.addEventListener('click', () => { selectedMethod = 'bank'; renderWithdrawal(); });
        if (methodCrypto) methodCrypto.addEventListener('click', () => { selectedMethod = 'crypto'; renderWithdrawal(); });

        // Input fields
        const amountInput = document.getElementById('amountInput');
        if (amountInput) amountInput.addEventListener('input', (e) => { withdrawalAmount = e.target.value; });
        const bankNameInput = document.getElementById('bankName');
        if (bankNameInput) bankNameInput.addEventListener('input', (e) => { bankDetails.bankName = e.target.value; });
        const accountNumberInput = document.getElementById('accountNumber');
        if (accountNumberInput) accountNumberInput.addEventListener('input', (e) => { bankDetails.accountNumber = e.target.value; });
        const holderNameInput = document.getElementById('holderName');
        if (holderNameInput) holderNameInput.addEventListener('input', (e) => { bankDetails.holderName = e.target.value; });
        const cryptoAddrInput = document.getElementById('cryptoAddress');
        if (cryptoAddrInput) cryptoAddrInput.addEventListener('input', (e) => { cryptoAddress = e.target.value; });
        const coinSelect = document.getElementById('coinSelect');
        if (coinSelect) coinSelect.addEventListener('change', (e) => { selectedCoin = e.target.value; });

        const submitBtn = document.getElementById('submitDetailsBtn');
        if (submitBtn) submitBtn.addEventListener('click', () => onSubmitDetails());

        // Admin Upgrade Tier (visible only in step 4)
        const adminUpgrade = document.getElementById('adminUpgradeBtn');
        if (adminUpgrade) adminUpgrade.addEventListener('click', () => { upgradeTier(); });

        const resetFailed = document.getElementById('resetFromFailedBtn');
        if (resetFailed) resetFailed.addEventListener('click', () => resetFlow());

        const cancelProcessing = document.getElementById('cancelProcessingBtn');
        if (cancelProcessing) cancelProcessing.addEventListener('click', () => {
            if (confirm('Cancel current withdrawal? The timer will be stopped.')) {
                if (processingInterval) clearInterval(processingInterval);
                processingEndTime = null;
                resetFlow();
            }
        });

        const cancelConfirm = document.getElementById('cancelConfirmBtn');
        if (cancelConfirm) cancelConfirm.addEventListener('click', () => {
            if (confirm('Cancel confirmation? You will lose this withdrawal progress.')) {
                if (confirmInterval) clearInterval(confirmInterval);
                confirmEndTime = null;
                resetFlow();
            }
        });

        const newWithdrawalBtn = document.getElementById('newWithdrawalBtn');
        if (newWithdrawalBtn) newWithdrawalBtn.addEventListener('click', () => resetFlow());
    }

    // ---------- INIT ----------
    (async () => {
        await fetchUserData();
        renderWithdrawal();
        setInterval(fetchUserData, 30000);
    })();
</script>
</body>
</html>
